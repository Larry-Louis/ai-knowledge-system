<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doc Chat - 文档对话</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; height: 100vh; display: flex; flex-direction: column; }

/* Header */
header { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 18px; }
header .doc-info { font-size: 13px; color: #888; margin-left: auto; }
header select { background: #2a2a4e; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
header select option { background: #1a1a2e; }
header .upload-btn { background: #4a6cf7; color: #fff; border: none; border-radius: 4px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
header .upload-btn:hover { background: #3b5de7; }

/* Main Layout */
.container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; padding: 0 16px; overflow: hidden; }

/* Chat Messages */
.chat-area { flex: 1; overflow-y: auto; padding: 20px 0; }
.msg { margin-bottom: 20px; display: flex; gap: 12px; }
.msg.user { justify-content: flex-end; }
.msg .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.msg.user .avatar { background: #4a6cf7; color: #fff; order: 1; }
.msg.ai .avatar { background: #e8ecff; color: #4a6cf7; }
.msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
.msg.user .bubble { background: #4a6cf7; color: #fff; border-bottom-right-radius: 4px; }
.msg.ai .bubble { background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
.msg .bubble p { margin: 6px 0; }
.msg .bubble strong { font-weight: 600; }
.msg .bubble em { font-style: italic; color: #666; }
.msg .sources { font-size: 11px; color: #999; margin-top: 6px; }
.msg .sources span { background: #f0f2ff; color: #4a6cf7; padding: 2px 8px; border-radius: 8px; margin-right: 4px; }

/* Input */
.input-area { flex-shrink: 0; padding: 16px 0; border-top: 1px solid #e0e0e0; background: #f5f5f5; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; background: #fff; }
.input-row input:focus { border-color: #4a6cf7; }
.input-row button { padding: 12px 24px; background: #4a6cf7; color: #fff; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; }
.input-row button:hover { background: #3b5de7; }
.input-row button:disabled { background: #ccc; cursor: not-allowed; }

/* File Upload Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; }
.upload-area:hover { border-color: #4a6cf7; background: #f8f9ff; }
.upload-area .icon { font-size: 36px; }
.upload-area .text { font-size: 13px; color: #888; margin-top: 8px; }
.upload-area input { display: none; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
.modal-actions .cancel { background: #f0f0f0; color: #666; }
.modal-actions .confirm { background: #4a6cf7; color: #fff; }
.modal-actions .confirm:disabled { background: #ccc; }

/* Loading dots */
.typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing span { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

.empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>💬 Doc Chat</h1>
  <select id="docSelect" onchange="selectDoc()">
    <option value="">— 选择文档 —</option>
  </select>
  <button id="mountBtn" style="display:none;background:#4a6cf7;color:#fff;border:none;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer" onclick="toggleMount(selectedDocId)">⛓️ 挂载</button>
  <button id="deleteBtn" style="display:none;background:#dc3545;color:#fff;border:none;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer" onclick="deleteDoc()">🗑️ 删除</button>
  <button class="upload-btn" onclick="showUpload()">+ 上传</button>
  <span style="font-size:12px;color:#888;cursor:pointer" id="mountSummary" onclick="showMountedList()">📎 挂载中: 0</span>
  <span class="doc-info" id="docInfo"></span>
</header>

<div class="container">
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="icon">📖</div>
      <p>选择一个文档，开始对话<br>你可以问关于文档内容的任何问题</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="输入关于文档的问题..." disabled
             onkeydown="if(event.key==='Enter') sendMsg()">
      <button id="sendBtn" onclick="sendMsg()" disabled>发送</button>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h2>📤 上传文档</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📄</div>
      <div class="text" id="uploadText">点击选择 .txt 或 .pdf 文件</div>
      <input type="file" id="fileInput" accept=".txt,.pdf" onchange="fileSelected()">
    </div>
    <div style="font-size:12px;color:#999;margin-top:8px" id="uploadStatus"></div>
    <div class="modal-actions">
      <button class="cancel" onclick="hideUpload()">取消</button>
      <button class="confirm" id="confirmUpload" onclick="uploadDoc()" disabled>上传</button>
    </div>
  </div>
</div>

<script>
let selectedDocId = null;
let selectedDocTitle = '';
let chatHistory = [];
let mountedDocs = new Set();

// Load mounted docs from rag-api
async function loadMounted() {
  try {
    const r = await fetch('/rag-api/documents/active');
    if (r.ok) {
      const data = await r.json();
      mountedDocs = new Set(data.active_doc_ids || []);
    }
  } catch(e) {}
  updateMountSummary();
}

// Delete document
async function deleteDoc() {
  if (!selectedDocId) return;
  if (!confirm(`确定要删除「${selectedDocTitle}」吗？\n此操作不可撤销。`)) return;
  try {
    const r = await fetch(`/documents/${selectedDocId}`, { method: 'DELETE' });
    if (r.ok) {
      mountedDocs.delete(selectedDocId);
      await fetch('/rag-api/documents/active', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({doc_ids: [...mountedDocs]})
      });
      selectedDocId = null;
      document.getElementById('docSelect').value = '';
      selectDoc();
      updateMountSummary();
      loadDocs();
    } else {
      const data = await r.json();
      alert('删除失败: ' + (data.detail || '未知错误'));
    }
  } catch(e) { alert('删除失败: ' + e.message); }
}

// Mount/unmount a document
async function toggleMount(docId) {
  const was = mountedDocs.has(docId);
  if (was) mountedDocs.delete(docId); else mountedDocs.add(docId);
  try {
    await fetch('/rag-api/documents/active', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({doc_ids: [...mountedDocs]})
    });
    showToast(was ? '已取消挂载' : '已挂载，对话将引用此文档');
  } catch(e) { showToast('挂载失败: ' + e.message); }
  updateMountSummary();
  selectDoc();
}

// Toast notification
function showToast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

// Update mount summary in header
function updateMountSummary() {
  const el = document.getElementById('mountSummary');
  el.textContent = mountedDocs.size > 0 ? `📎 挂载中: ${mountedDocs.size}` : '📎 挂载中: 0';
}

// Show list of mounted documents
function showMountedList() {
  if (mountedDocs.size === 0) {
    showToast('当前没有挂载任何文档');
    return;
  }
  // Get doc titles from the select options
  const sel = document.getElementById('docSelect');
  const names = [];
  for (const opt of sel.options) {
    if (mountedDocs.has(opt.value) && opt.value) {
      names.push(opt.text.split(' (')[0]);
    }
  }
  showToast('已挂载: ' + names.join(', '));
}

// Load documents
async function loadDocs() {
  try {
    const r = await fetch('/documents');
    const data = await r.json();
    const sel = document.getElementById('docSelect');
    const current = sel.value;
    sel.innerHTML = '<option value="">— 选择文档 —</option>';
    (data.documents || []).forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = `${d.title} (${d.total_chapters}章)`;
      sel.appendChild(opt);
    });
    if (current && [...sel.options].some(o => o.value === current)) sel.value = current;
  } catch(e) { console.error(e); }
}

// Select document
function selectDoc() {
  const sel = document.getElementById('docSelect');
  selectedDocId = sel.value || null;
  selectedDocTitle = sel.options[sel.selectedIndex]?.text || '';
  document.getElementById('docInfo').textContent = selectedDocId
    ? `${selectedDocTitle} ${mountedDocs.has(selectedDocId) ? '🔗' : ''}`
    : '';
  document.getElementById('msgInput').disabled = !selectedDocId;
  document.getElementById('sendBtn').disabled = !selectedDocId;
  document.getElementById('deleteBtn').style.display = selectedDocId ? 'inline-block' : 'none';
  updateMountBtn();
  
  if (selectedDocId) {
    document.getElementById('chatArea').innerHTML = `
      <div class="msg ai">
        <div class="avatar">🤖</div>
        <div class="bubble">
          文档已就绪！你可以问我任何关于这份文档的问题。
          ${mountedDocs.has(selectedDocId)
            ? '\n\n📎 当前文档已挂载，对话会引用其中的内容。'
            : '\n\n🔇 当前文档未挂载，点击上方「挂载」按钮后在对话中引用。'}
        </div>
      </div>`;
    chatHistory = [];
  }
}

function updateMountBtn() {
  const btn = document.getElementById('mountBtn');
  if (!selectedDocId) { btn.style.display = 'none'; return; }
  btn.style.display = 'inline-block';
  const mounted = mountedDocs.has(selectedDocId);
  btn.textContent = mounted ? '🔗 已挂载' : '⛓️ 挂载';
  btn.style.background = mounted ? '#28a745' : '#4a6cf7';
}

// Show/hide upload
function showUpload() {
  document.getElementById('uploadModal').classList.add('show');
  document.getElementById('uploadText').textContent = '点击选择 .txt 或 .pdf 文件';
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('confirmUpload').disabled = true;
}

function hideUpload() {
  document.getElementById('uploadModal').classList.remove('show');
}

function fileSelected() {
  const file = document.getElementById('fileInput').files[0];
  if (file) {
    document.getElementById('uploadText').textContent = '已选择: ' + file.name;
    document.getElementById('confirmUpload').disabled = false;
  }
}

// Upload document
async function uploadDoc() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;
  const btn = document.getElementById('confirmUpload');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;
  status.textContent = '上传中，请稍候...';

  const fd = new FormData();
  fd.append('file', file);

  try {
    const r = await fetch('/documents/upload', { method: 'POST', body: fd });
    const data = await r.json();
    if (r.ok) {
      const chunks = data.total_chunks || data.total_chapters;
      status.innerHTML = '✅ 上传成功！' + data.total_chapters + ' 章，' + chunks + ' 块';
      setTimeout(hideUpload, 1200);
      await loadDocs();
      document.getElementById('docSelect').value = data.document_id;
      selectDoc();
    } else {
      status.innerHTML = '❌ ' + (data.detail || '上传失败');
      btn.disabled = false;
    }
  } catch(e) {
    status.innerHTML = '❌ 网络错误: ' + e.message;
    btn.disabled = false;
  }
}

// Send message
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg || !selectedDocId) return;

  input.value = '';
  btn.disabled = true;

  // Add user message to chat
  addMessage('user', msg);

  // Show typing indicator
  const typingId = showTyping();

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000); // 2分钟超时
    const r = await fetch(`/documents/${selectedDocId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    const data = await r.json();

    // Remove typing indicator
    removeTyping(typingId);

    if (r.ok) {
      addMessage('ai', data.reply, data.sources);
    } else {
      addMessage('ai', '❌ 出错了: ' + (data.detail || '未知错误'));
    }
  } catch(e) {
    removeTyping(typingId);
    if (e.name === 'AbortError') {
      addMessage('ai', '⏱️ 请求超时，请稍后重试');
    } else {
      addMessage('ai', '❌ 网络错误: ' + e.message);
    }
  }
  btn.disabled = false;
}

function addMessage(role, content, sources) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  
  const avatar = role === 'user' ? '👤' : '🤖';
  
  let sourcesHtml = '';
  if (sources && sources.length > 0) {
    sourcesHtml = '<div class="sources">' + sources.map(s => `<span>${s}</span>`).join('') + '</div>';
  }

  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">
      ${content.replace(/\n/g, '<br>')}
      ${sourcesHtml}
    </div>`;

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = id;
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// Init
loadDocs();
</script>
</body>
</html>
